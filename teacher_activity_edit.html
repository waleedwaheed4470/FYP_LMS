{% extends 'base.html' %}
{% block title %}Edit Activity{% endblock %}
{% block content %}
<div class="container">
  <a class="btn" href="{{ url_for('teacher_activity_detail', activity_id=activity.id) }}">← Back</a>
  <h1 class="page-title">Edit Activity</h1>

  <form method="post" enctype="multipart/form-data" class="form">
    <div class="form-group">
      <label for="type">Type</label>
      <select id="type" name="type" class="input">
        <option value="assignment" {% if activity.type=='assignment' %}selected{% endif %}>Assignment</option>
        <option value="quiz" {% if activity.type=='quiz' %}selected{% endif %}>Quiz</option>
      </select>
    </div>

    <div class="form-group">
      <label for="title">Title</label>
      <input id="title" name="title" type="text" class="input" value="{{ activity.title }}" required />
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" class="input" rows="4">{{ activity.description }}</textarea>
    </div>

    <div class="form-group">
      <label for="due_date">Due Date</label>
      <input id="due_date" name="due_date" type="datetime-local" class="input" value="{{ due_value }}" />
    </div>

    <div class="form-group">
      <label>Existing Materials</label>
      {% if attachments and attachments|length > 0 %}
        <ul class="list">
          {% for att in attachments %}
            <li>
              <label class="checkbox-label">
                <input type="checkbox" name="remove_attachment" value="{{ att.storage_path or att.url }}">
                <span>Remove</span>
              </label>
              <a href="{{ att.url }}" target="_blank"><i class="fas fa-file"></i> {{ att.name }}</a>
            </li>
          {% endfor %}
        </ul>
      {% else %}
        <p class="muted">No materials.</p>
      {% endif %}
    </div>

    <div class="form-group">
      <label for="attachments">Add Materials (PDF/DOC/DOCX) — multiple allowed</label>
      <input id="attachments" name="attachments" type="file" class="input" accept=".pdf,.doc,.docx" multiple />
    </div>

    <div class="actions">
      <button class="btn btn-primary" type="submit">Save Changes</button>
      <a class="btn" href="{{ url_for('teacher_activity_detail', activity_id=activity.id) }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
